<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RobPac Publishing — Catalog</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f8fb;--card:#fff;--text:#0f172a;--muted:#64748b;--brand:#ea580c;}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)}
    header{padding:20px 28px;background:#fff;box-shadow:0 1px 0 rgba(15,23,42,.06);position:sticky;top:0;z-index:10}
    header h1{margin:0;font-size:20px;font-weight:700}
    main{max-width:1100px;margin:24px auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
    .card{background:var(--card);border-radius:14px;box-shadow:0 6px 20px rgba(15,23,42,.06);overflow:hidden;display:flex;flex-direction:column}
    .cover{width:100%;aspect-ratio:3/4;object-fit:cover;background:#e2e8f0}
    .body{padding:14px 14px 16px}
    .title{font-weight:700;margin:8px 0 6px;font-size:16px;line-height:1.25;min-height:40px}
    .author{color:var(--muted);font-size:13px;margin:0 0 8px}
    .desc{color:var(--muted);font-size:13px;height:40px;overflow:hidden}
    .btn{margin-top:12px;display:inline-block;background:var(--brand);color:#fff;text-decoration:none;
         padding:10px 12px;border-radius:10px;font-weight:700;font-size:13px;text-align:center}
    .pill{display:inline-block;font-size:11px;color:#0f766e;background:#ccfbf1;border:1px solid #99f6e4;
          padding:2px 8px;border-radius:999px}
    .bar{display:flex;align-items:center;gap:10px}
  </style>
</head>
<body>
  <header><h1>RobPac Publishing — Book Catalog</h1></header>
  <main>
    <div id="cards" class="grid"></div>
  </main>

<script>
(async function(){
  const cards = document.getElementById('cards');
  const JSON_SOURCES = ["books.json","libri_backup.json"];

  async function tryFetch(url){
    try{
      const r = await fetch(url,{cache:"no-store"});
      if(!r.ok) return null;
      const data = await r.json();
      return Array.isArray(data) ? data : (data.items || data.data || null);
    }catch(e){ return null; }
  }

  function normalize(b){
    if ('titolo' in b){ // books.json style (IT)
      return {
        title: b.titolo?.trim() || "",
        author: b.autore?.trim() || "",
        image: b.immagine?.trim() || "",
        description: b.descrizione?.trim() || "",
        amazon: b.linkAmazon?.trim() || "",
        tag: (b.sottogenere || b.genere || "").toLowerCase()
      };
    }
    // fallback generic
    return {
      title: b.title?.trim() || "",
      author: b.author?.trim() || b.autore?.trim() || "",
      image: (b.cover || b.image || "").trim(),
      description: (b.description || b.descrizione || "").trim(),
      amazon: (b.amazon || b.linkAmazon || "").trim(),
      tag: (b.subgenre || b.sottogenere || b.genre || "").toLowerCase()
    };
  }

  // Prefer books.json, then fallback
  let list = null;
  for (const s of JSON_SOURCES){
    const d = await tryFetch(s);
    if (d && d.length){ list = d; break; }
  }
  if (!list){ cards.innerHTML = "<p>Catalog unavailable.</p>"; return; }

  // map & render
  const items = list.map(normalize).filter(x=>x.title);
  const frag = document.createDocumentFragment();

  for (const b of items){
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.className = 'cover';
    // allow http(s) links, else assume local covers folder
    img.src = /^https?:\/\//i.test(b.image) ? b.image : (b.image ? ("covers/"+b.image) : "");
    img.alt = b.title + " cover";
    card.appendChild(img);

    const body = document.createElement('div');
    body.className = 'body';

    const bar = document.createElement('div');
    bar.className = 'bar';
    const pill = document.createElement('span');
    pill.className = 'pill';
    pill.textContent = (b.tag || "self-help");
    bar.appendChild(pill);
    body.appendChild(bar);

    const h3 = document.createElement('div');
    h3.className = 'title';
    h3.textContent = b.title;
    body.appendChild(h3);

    const by = document.createElement('div');
    by.className = 'author';
    by.textContent = "by " + (b.author || "—");
    body.appendChild(by);

    const d = document.createElement('div');
    d.className = 'desc';
    d.textContent = b.description || "";
    body.appendChild(d);

    if (b.amazon){
      const a = document.createElement('a');
      a.className = 'btn';
      a.href = b.amazon; a.target = "_blank"; a.rel = "noopener";
      a.textContent = "View Details";
      body.appendChild(a);
    }

    card.appendChild(body);
    frag.appendChild(card);
  }

  cards.appendChild(frag);
})();
</script>
</body>
</html>
