<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>RobPac Publishing</title>
  <link rel="icon" href="assets/logo3senzasfondo.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    /* --- HERO --- */
    .hero{background:url('assets/hero.png') center/cover no-repeat; min-height:520px; position:relative}
    .hero::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.06))}
    .hero-box{position:absolute; left:6%; top:18%; color:#f5e6b3; text-shadow:0 2px 6px rgba(0,0,0,.45)}
    .hero-box img.tit{max-width:720px; width:60vw}
    .hero-box img.sub{max-width:560px; width:48vw; margin-top:.5rem}

    /* --- CARD --- */
    .card{width:260px; background:#fff; border-radius:14px; box-shadow:0 8px 22px rgba(0,0,0,.08); overflow:hidden; display:flex; flex-direction:column}
    .cover{width:100%; aspect-ratio:2/3; object-fit:cover; background:#edf2f7}
    .body{padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px}
    .badge{font-size:.72rem; padding:.22rem .55rem; background:#fef3c7; color:#92400e; border-radius:8px; display:inline-block}
    .ttl{font-weight:800; line-height:1.1}
    .aut{color:#4a5568; font-size:.9rem}
    .btn{background:#f59e0b; color:#111827; font-weight:800; padding:.6rem 1rem; border-radius:10px}
    .btn:hover{filter:brightness(.95)}

    /* --- CAROUSEL --- */
    .hscroll{display:flex; gap:16px; overflow-x:auto; padding:8px 6px; scroll-snap-type:x mandatory}
    .hscroll>*{scroll-snap-align:start}

    /* --- CATALOGO --- */
    .gridcat{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px}

    /* --- MODALE --- */
    .back{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:50}
    .modal{width:min(980px,92vw); background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 20px 70px rgba(0,0,0,.35); position:relative}
    .m-body{display:grid; grid-template-columns:300px 1fr; gap:22px; padding:24px}
    .m-cover{width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:10px; background:#edf2f7}
    .x{position:absolute; right:18px; top:12px; font-size:26px; cursor:pointer; color:#374151}
    @media(max-width:860px){.m-body{grid-template-columns:1fr}.hero-box img.tit{width:78vw}.hero-box img.sub{width:62vw}}
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <!-- HEADER -->
  <header class="w-full bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="assets/logo3senzasfondo.png" alt="RobPac logo" class="w-9 h-9">
        <img src="assets/robpac-title.png" alt="RobPac Publishing" class="h-6 md:h-7">
      </div>
      <a href="#catalog" class="btn text-sm">Free Chapter</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-box">
      <img src="assets/robpac-title.png" class="tit" alt="RobPac Publishing">
      <img src="assets/sottotitolo.png" class="sub" alt="A World of Books at Your Fingertips">
      <div class="mt-6 flex flex-wrap gap-4">
        <a href="#catalog" class="btn">Get Free Chapter Now</a>
        <a href="#catalog" class="btn">Browse 100+ Books</a>
      </div>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <!-- BESTSELLERS (SENZA DESCRIZIONE) -->
    <section>
      <h2 class="text-2xl md:text-3xl font-extrabold mb-4">Bestselling Titles</h2>
      <div id="best" class="hscroll"></div>
    </section>

    <!-- CATALOGO -->
    <section id="catalog" class="mt-12">
      <h2 class="text-2xl md:text-3xl font-extrabold mb-6">Complete Book Catalog</h2>
      <div id="grid" class="gridcat"></div>
    </section>
  </main>

  <!-- MODALE -->
  <div id="modalRoot" class="back">
    <div class="modal">
      <button class="x" aria-label="Chiudi" onclick="closeModal()">×</button>
      <div class="m-body">
        <img id="mCover" class="m-cover" alt="Copertina libro">
        <div>
          <span class="badge mb-2" id="mCat"></span>
          <h3 class="text-3xl font-extrabold leading-tight" id="mTitle"></h3>
          <p class="mt-1 text-lg text-gray-600" id="mAuthor"></p>
          <h4 class="mt-6 mb-2 font-bold text-gray-800">About This Book</h4>
          <p id="mDesc" class="leading-relaxed"></p>
          <div class="mt-6 flex gap-3">
            <a id="mAmazon" target="_blank" rel="noopener" class="btn">Buy on Amazon</a>
            <a id="mSample" target="_blank" rel="noopener" class="btn">Get Free Chapter</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ------- risoluzione copertina ------- */
    function resolveCover(b){
      const picks=[b.cover,b.image,b.img,b.thumbnail,b.copertina,b.cover_url,b.image_url].filter(Boolean);
      let u=picks[0]||"";
      if(!u) return "assets/placeholder-cover.png";        // placeholder neutro (mettilo se non c'è)
      if(/^https?:\/\//i.test(u)) return u.replace(/^http:\/\//i,"https://");
      if(!u.startsWith("covers/")) u="covers/"+u;          // filename → cartella covers/
      return u;
    }
    function fullDesc(b){
      const d=[b.descrizione,b.description,b.desc,b.sinossi,b.abstract].filter(Boolean);
      return d[0]||"";
    }
    const _cat=b=>b.category||b.categoria||b.genre||"Self-help";
    const _aut=b=>b.author||b.autore||"Unknown Author";
    const _tit=b=>b.title||b.titolo||"Untitled";

    function mkCard(b){
      const el=document.createElement("div");
      el.className="card";
      el.innerHTML=`
        <img class="cover" alt="Cover of ${_tit(b)}">
        <div class="body">
          <span class="badge">${_cat(b)}</span>
          <div class="ttl">${_tit(b)}</div>
          <div class="aut">by ${_aut(b)}</div>
          <button class="btn mt-2">View Details</button>
        </div>`;
      const img=el.querySelector("img.cover");
      img.src=resolveCover(b);
      img.onerror=()=>{img.src="assets/placeholder-cover.png";}
      el.querySelector("button").onclick=()=>openModal(b);
      return el;
    }

    function openModal(b){
      const c=document.getElementById("mCover");
      c.src=resolveCover(b);
      c.onerror=()=>{c.src="assets/placeholder-cover.png";}
      document.getElementById("mCat").textContent=_cat(b);
      document.getElementById("mTitle").textContent=_tit(b);
      document.getElementById("mAuthor").textContent="by "+_aut(b);
      document.getElementById("mDesc").textContent=fullDesc(b);
      document.getElementById("mAmazon").href=b.amazon||b.link_amazon||"#";
      document.getElementById("mSample").href=b.sample||b.free_chapter||"#";
      document.getElementById("modalRoot").style.display="flex";
    }
    function closeModal(){document.getElementById("modalRoot").style.display="none";}

    async function boot(){
      const res=await fetch("libri_backup_2025-11-07 -.json");
      const books=await res.json();

      const best=document.getElementById("best");
      books.slice(0,6).forEach(b=>best.appendChild(mkCard(b)));

      const grid=document.getElementById("grid");
      books.forEach(b=>grid.appendChild(mkCard(b)));
    }
    boot();
  </script>
</body>
</html>
