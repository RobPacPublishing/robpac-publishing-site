<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RobPac Publishing – Catalog</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <style>
    html,body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .container-rl{max-width:1200px;margin:0 auto;padding:0 1rem}
    .shadow-soft{box-shadow:0 10px 30px rgba(0,0,0,.12)}
    .card{transition:transform .15s ease, box-shadow .15s ease}
    .card:hover{transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,.18)}
    .pill{border:1px solid rgba(15,23,42,.1)}
    .line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .fixed-ratio{position:relative;padding-top:150%;background:#f1f5f9}
    .fixed-ratio>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;image-rendering:auto}
    .carousel{overflow-x:auto;scroll-snap-type:x mandatory;display:flex;gap:24px;padding:6px}
    .carousel::-webkit-scrollbar{height:8px}
    .carousel::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:9999px}
    .carousel-item{scroll-snap-align:start;flex:0 0 270px}
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="bg-white sticky top-0 z-40 border-b border-gray-100">
    <div class="container-rl flex items-center justify-between py-3">
      <div class="flex items-center gap-3">
        <img src="assets/logo.png" alt="RobPac Publishing" class="w-8 h-8 rounded-full object-cover">
        <strong>RobPac Publishing</strong>
      </div>
      <nav class="hidden md:flex items-center gap-6 text-sm">
        <a href="#featured" class="hover:text-yellow-700">Featured</a>
        <a href="#catalog" class="hover:text-yellow-700">Catalog</a>
        <a href="#about" class="hover:text-yellow-700">About</a>
      </nav>
    </div>
  </header>

  <section id="featured" class="container-rl py-10">
    <h2 class="text-2xl font-extrabold mb-4">Bestselling Titles</h2>
    <div id="featuredTrack" class="carousel"></div>
  </section>

  <section id="catalog" class="container-rl py-10">
    <h2 class="text-2xl font-extrabold text-center mb-6">Complete Book Catalog</h2>
    <div class="max-w-xl mx-auto flex gap-2 mb-6">
      <input id="searchInput" class="w-full rounded-lg border pill px-3 py-2" placeholder="Search by title, author, or keyword...">
      <button id="searchBtn" class="px-4 py-2 rounded bg-yellow-600 text-white">Search</button>
    </div>
    <div id="catalogGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </section>

  <div id="bookModal" class="fixed inset-0 hidden items-center justify-center bg-black bg-opacity-50 p-4">
    <div class="bg-white max-w-4xl w-full rounded-xl shadow-soft p-6 grid md:grid-cols-5 gap-6 relative">
      <button id="closeModal" class="absolute top-4 right-4 bg-white rounded-full w-9 h-9 flex items-center justify-center shadow">✕</button>
      <div id="bookModalContent" class="md:col-span-5 grid md:grid-cols-5 gap-6"></div>
    </div>
  </div>

  <script type="module">
    const PH = 'data:image/svg+xml;utf8,<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="400" height="600"><rect width="100%" height="100%" fill="%23e2e8f0"/><text x="50%" y="52%" text-anchor="middle" font-family="Arial" font-size="18" fill="%23475569">Cover</text></svg>';
    const books = [];

    function cleanDescription(text){
      const norm = s => String(s||'').replace(/\\s+/g,' ').trim();
      const stripEnd = s => String(s||'').replace(/[ \\t]*[.…]+$/,'').trim();
      let t = String(text||'');

      // dedupe paragraph-level
      let paras = t.split(/\\r?\\n+/).map(s=>s.trim()).filter(Boolean);
      const outP=[];
      for(let i=0;i<paras.length;i++){
        const cur = stripEnd(paras[i]).toLowerCase();
        const prev = i? stripEnd(paras[i-1]).toLowerCase():'';
        if(i && cur===prev) continue;
        outP.push(paras[i]);
      }
      t = outP.join('\\n');

      // dedupe sentence-level
      const parts = t.split(/(?<=[\\.!?…])\\s+/);
      const out=[];
      for(const s of parts){
        const base = stripEnd(s).toLowerCase();
        if(!base) continue;
        const last = out.length? stripEnd(out[out.length-1]).toLowerCase():'';
        if(base===last) continue;
        out.push(s.trim());
      }
      t = out.join(' ');

      // remove trailing ellipsis
      t = stripEnd(t);
      return t;
    }

    function cardHTML(b, gIdx, fetchprio="auto"){
      const cat = (b.category||'Book').toLowerCase();
      const catColor = { 'self-help':'yellow-600','psychology':'blue-600','fiction':'purple-600','health':'green-600','diet':'yellow-700','cookbooks':'pink-600' }[cat] || 'gray-600';
      const desc = cleanDescription((b.description||'') + (b.longDescription?(' '+b.longDescription):''));
      return `
      <div class="card bg-white rounded-xl overflow-hidden shadow-soft flex flex-col carousel-item">
        <div class="fixed-ratio">
          <img src="${b.cover||''}" alt="${b.title||''}" loading="lazy" decoding="async" fetchpriority="${fetchprio}" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src='${PH}'">
        </div>
        <div class="p-4 flex-1 flex flex-col">
          <span class="inline-block bg-${catColor} text-white text-xxs px-2 py-1 rounded-full mb-2 uppercase font-semibold">${b.category||'Book'}</span>
          <h3 class="text-base font-bold leading-snug">${b.title||''}</h3>
          <p class="text-gray-500 text-xs mb-3">by ${b.author||''}</p>
          <p class="text-gray-700 text-sm mb-4 line-clamp-3">${desc}</p>
          <div class="mt-auto flex gap-2">
            <button class="w-full bg-yellow-600 text-white py-2 rounded-lg" data-idx="${gIdx}" onclick="openBookModal(this.dataset.idx)">View Details</button>
          </div>
        </div>
      </div>`;
    }

    window.openBookModal = function(idx){
      const i = Number(idx);
      const b = books[i]; if(!b) return;
      const desc = cleanDescription((b.description||'') + (b.longDescription?(' '+b.longDescription):''));
      const c = document.getElementById('bookModalContent');
      c.innerHTML = `
        <div class="md:col-span-2">
          <div class="fixed-ratio"><img src="${b.cover||''}" alt="${b.title||''}" decoding="async" fetchpriority="high" onerror="this.onerror=null;this.src='${PH}'"></div>
        </div>
        <div class="md:col-span-3">
          <h3 class="text-2xl font-extrabold mb-1">${b.title||''}</h3>
          <p class="text-gray-500 mb-4">by ${b.author||''}</p>
          <p class="text-gray-700 leading-relaxed mb-5">${desc}</p>
          <div class="flex flex-wrap gap-3">
            <a href="${b.amazonLink||'#'}" target="_blank" class="px-4 py-2 rounded bg-yellow-600 text-white">Buy on Amazon</a>
          </div>
        </div>`;
      const m=document.getElementById('bookModal'); m.classList.remove('hidden'); m.classList.add('flex');
    }
    document.getElementById('closeModal').addEventListener('click',()=>{
      const m=document.getElementById('bookModal'); m.classList.add('hidden'); m.classList.remove('flex');
    });

    async function loadBooks(){
      const candidates = [
        'libri_backup_2025-11-07 -.json',
        'assets/libri_backup_2025-11-07 -.json',
        'books.json',
        'assets/books.json'
      ];
      for (const url of candidates){
        try{
          const res = await fetch(url, {cache:'no-store'});
          if(!res.ok) continue;
          const arr = await res.json();
          if(Array.isArray(arr) && arr.length) return arr;
        }catch(_){}
      }
      return [];
    }

    function renderFeatured(){
      const track=document.getElementById('featuredTrack');
      track.innerHTML='';
      const top = books.slice(0,12);
      top.forEach((b)=>{
        const gIdx = b.__idx; // usare indice globale
        track.insertAdjacentHTML('beforeend', cardHTML(b, gIdx, "high"));
      });
    }
    function renderCatalog(list){
      const root=document.getElementById('catalogGrid'); if(!root) return;
      root.innerHTML='';
      (list||books).forEach((b)=>{
        root.insertAdjacentHTML('beforeend', cardHTML(b, b.__idx));
      });
    }

    (async function boot(){
      const arr = await loadBooks();
      // assegnare indice globale stabile
      arr.forEach((b,idx)=> b.__idx = idx);
      books.splice(0, books.length, ...arr);
      renderFeatured();
      renderCatalog();
    })();

    document.getElementById('searchBtn').addEventListener('click',()=>{
      const q=(document.getElementById('searchInput').value||'').toLowerCase();
      const res=books.filter(b=>(b.title||'').toLowerCase().includes(q)||(b.author||'').toLowerCase().includes(q)||(b.description||'').toLowerCase().includes(q));
      renderCatalog(res);
    });
  </script>
</body>
</html>
