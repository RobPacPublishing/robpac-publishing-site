  <script id="books-data" type="application/json">[{"title": "The Dark Side of Charisma: How Narcissists Use Charisma to Manipulate", "author": "Ryan Walker", "category": "Book", "cover": "", "description": "A book exploring the dark side of charisma, revealing how charm and influence can be weaponized for manipulation. It offers tools to identify emotional manipulation tactics used by charismatic narcissists in both professional and personal settings. The guide teaches readers to recognize signs of manipulation like gaslighting, defend themselves effectively, and use their own charisma ethically. Essential reading for anyone looking to protect themselves from manipulators and develop authentic relationships built on trust.", "amazonLink": "", "rating": 4.5}, {"title": "Whispers in the Abyss: A Symphony of Realities", "author": "Jackson Blackwood", "category": "Book", "cover": "", "description": "A mind-bending journey following Audrey Connors, a forensic acoustician with the extraordinary ability to hear what others can't. When she discovers a mysterious sound file, she's pulled into a cosmic conflict spanning multiple realities. This thriller blends cutting-edge science with philosophy, exploring consciousness, free will, and the nature of reality itself. With an intricate plot, well-developed characters, and cosmic scope, it's perfect for fans of hard sci-fi and metaphysical adventures. Critics call it \"a tour de force of imagination\" that's \"redefining the boundaries of science fiction.\"", "amazonLink": "", "rating": 4.5}, {"title": "RUMINAZIONE MENTALE: Libera la mente dal pensiero ossessivo", "author": "Massimo Recaldi", "category": "Book", "cover": "", "description": "Una guida completa per liberarsi dalla ruminazione mentale e dai pensieri ossessivi che possono causare stress, ansia e isolamento. Il libro offre una comprensione approfondita delle cause della ruminazione e strategie pratiche per gestirla efficacemente. Copre aspetti come le strategie cognitive e comportamentali, l'importanza dello stile di vita, le relazioni interpersonali, e l'uso della tecnologia per il benessere mentale. Utile per chiunque desideri migliorare la propria consapevolezza emotiva, sviluppare resilienza mentale e vivere una vita più equilibrata e produttiva.", "amazonLink": "", "rating": 4.5}, {"title": "Carnivore Diet Cookbook: Revitalize Your Health: Irresistible Meat Recipes for Rapid Weight Loss, Muscle Gain, and Pain Relief", "author": "Jordan Prescott", "category": "Book", "cover": "", "description": "A comprehensive guide to the carnivore diet featuring meat-based recipes designed for weight loss, muscle gain, and pain relief. This cookbook offers easy-to-follow recipes suitable for busy professionals, health enthusiasts, and parents seeking healthier lifestyle options. It provides practical tips, expert advice, and nutritional insights to help readers overcome health concerns and dietary challenges. The book presents the carnivore diet as a revolutionary nutritional approach that can transform health through simple, delicious recipes that fit into busy schedules.", "amazonLink": "", "rating": 4.5}, {"title": "La Via del Guerriero Illuminato: Virtù Marziali e Saggezza Buddhista", "author": "Adrian Stone", "category": "Book", "cover": "", "description": "🔥 Scopri i segreti millenari delle arti marziali tradizionali attraverso una prospettiva completamente nuova!\n\nQuesto non è il solito libro sulle arti marziali. È un viaggio profondo attraverso la saggezza del guerriero, dove tecniche antiche si trasformano in strumenti di crescita personale e spirituale per la vita moderna.\n\n⚡ Cosa troverai in questo libro:\n\nLa fusione unica tra filosofia buddhista e pratica marziale\nTecniche concrete per trasformare la tua pratica quotidiana\nLa via del guerriero applicata alle sfide contemporanee\n🎯 Perfetto per praticanti di ogni livello che cercano di approfondire la dimensione interiore della loro arte.", "amazonLink": "", "rating": 4.5}, {"title": "Nonna Lina's Italian Kitchen: Stories and Simple Recipes from a Centenarian's Heart", "author": "Antony Lucchesi", "category": "Book", "cover": "", "description": "Discover authentic Italian cooking through the eyes of a remarkable centenarian in this touching collection of recipes and memories. Boston chef Anthony (Tony) Lucchesi preserves his grandmother's culinary legacy in \"Nonna Lina's Italian Kitchen,\" taking readers from Southern Italy to Boston's North End through 55 detailed recipes and family stories.\nExplore time-honored pasta dishes, bread-making secrets, simple vegetable preparations, traditional preservation techniques, and sweet treats that embody an Italian grandmother's love. This cookbook is a master class in \"cucina povera\"—the ingenious \"poor cooking\" tradition transforming humble ingredients into extraordinary meals.\nEach recipe includes Nonna Lina's personal memories and invaluable tips passed down through generations. Perfect for home cooks seeking authentic Italian recipes, food lovers interested in traditional techniques, and anyone wanting to connect with Italian heritage. Features family-tested recipes with clear instructions, stories behind each dish, traditional techniques explained in modern terms, and Nonna's wisdom throughout.", "amazonLink": "", "rating": 4.5}, {"title": "Perception and Attention Biases: Understanding and Overcoming Cognitive Distortions (Understanding the Mind)", "author": "John Keagan Dr.", "category": "Book", "cover": "", "description": "A comprehensive guide exploring the hidden cognitive biases that shape our decisions, judgments, and perceptions. Drawing from cognitive psychology and neuroscience research, the book explains why we sometimes see nonexistent patterns, how technology exploits our natural biases, how attention shapes our reality, and strategies professionals use to overcome perceptual limitations. It translates complex scientific concepts into practical knowledge, combining theory with real-world examples and techniques for enhancing cognitive capabilities. Designed for professionals, students, and anyone interested in improving decision-making, the book provides tools to better understand how the mind works and make more informed choices.", "amazonLink": "", "rating": 4.5}, {"title": "RESTLESS SILENCE", "author": "Ryan Walker", "category": "Book", "cover": "", "description": "Restless Silence takes you deep into the inner world of a protagonist trapped between the comfort of stasis and the desire for evolution. This introspective journey explores the conflict between hope and resignation, asking profound questions about the possibility of change and the fear of the unknown.\n\nCaught in the in-between, the protagonist grapples with the tension between staying the same and the unsettling prospect of transformation. Each moment teeters between fleeting hope and the weight of resignation, forcing the reader to confront their thoughts on growth, stagnation, and the delicate balance of existence.\n\nWith rich, reflective prose, Restless Silence is a thought-provoking exploration of life’s quiet battles—the internal struggle between standing still and moving forward. This book is for readers who appreciate introspective narratives that challenge the mind and stir the soul.\n\nIf you've ever questioned whether real change is possible or wondered how to navigate the space between comfort and the unknown, this book will resonate deeply with you.", "amazonLink": "", "rating": 4.5}, {"title": "Santa's Kitchen Cookbook: 60+ Merry Recipes for Family Fun and Festive Feasts", "author": "Candice Cauldron", "category": "Book", "cover": "", "description": "A delightful Christmas cookbook featuring over 60 festive, family-friendly recipes that transform your kitchen into Santa's magical workshop. The collection includes Christmas morning breakfasts, appetizers, main courses, side dishes, desserts, beverages, and edible gift ideas. Suitable for cooks of all skill levels, the book features a special \"Santa's Helpers' Corner\" with kitchen safety tips for children and suggestions for family cooking activities. Perfect for creating memorable holiday traditions and entertaining guests during the Christmas season, this cookbook combines practical cooking instructions with festive joy.", "amazonLink": "", "rating": 4.5}, {"title": "Born Again: A Journey of Spiritual Renewal and Transformation in Christ", "author": "Graham Mayer", "category": "Book", "cover": "", "description": "\"Born Again: A Journey of Spiritual Renewal and Transformation in Christ\" offers a comprehensive exploration of the concept of spiritual rebirth in evangelical Christianity. This insightful book delves into the biblical foundations, historical context, and contemporary relevance of being \"born again,\" providing readers with a deep understanding of this transformative experience.\n\nFrom the words of Jesus to modern-day testimonies, the author examines the theological implications and practical applications of spiritual renewal. With sensitivity to cultural challenges and a focus on personal faith, this book offers valuable insights for both newcomers to the faith and long-time believers seeking to deepen their spiritual journey.\n\nAddressing common misconceptions and offering guidance on living out one's faith daily, \"Born Again\" serves as both a scholarly resource and a practical guide. It explores topics such as the role of the Holy Spirit, the assurance of salvation, and the call to evangelism, all while emphasizing the profound personal transformation at the heart of the born-again experience.\n\nWhether you're curious about evangelical beliefs, seeking to understand your own spiritual journey, or looking to reinvigorate your faith, this book provides a thoughtful, balanced, and inspiring examination of what it truly means to be born again in Christ.", "amazonLink": "", "rating": 4.5}, {"title": "Halloween Cookbook for Little Monsters: Spooky Snacks and Creepy Treats", "author": "Candice Cauldron", "category": "Book", "cover": "", "description": "A Halloween-themed cookbook offering over 60 fun and easy recipes for families. \"Spooky Snacks and Creepy Treats\" includes morning breakfast ideas, snacks, main dishes, sides, desserts, and drinks—all designed with a Halloween twist. Beyond recipes, it serves as a complete party planning guide with entertaining ideas, edible crafts, fall activities, and nutrition notes for health-conscious parents. With easy-to-follow instructions, the cookbook aims to help families create memorable Halloween celebrations through food, making it a comprehensive resource for anyone looking to add festive flair to their October gatherings. Perfect for parents wanting to create special Halloween experiences for their \"little monsters.\"", "amazonLink": "", "rating": 4.5}, {"title": "Mindfulness for Beginners: Your Path to Calm and Clarity", "author": "Ava Wells", "category": "Book", "cover": "", "description": "A beginner-friendly guide to mindfulness that teaches fundamental practices for cultivating awareness, reducing stress, and building emotional resilience. The book provides practical instruction on integrating mindfulness into daily routines through techniques like mindful breathing and body scans, applicable to everyday activities including eating, working, and communicating. It explains the science behind how mindfulness rewires the brain for improved focus, compassion, and calm. Designed for those seeking anxiety relief, better relationships, or greater purpose, the guide offers step-by-step approaches to transform one's life through present-moment awareness and develop lasting well-being.", "amazonLink": "", "rating": 4.5}, {"title": "Pellegrini di Speranza: Storia, Fede e Testimonianze nel Giubileo 2025", "author": "Lorenzo De Sanctis", "category": "Book", "cover": "", "description": "Scopri Giubileo 2025: Pellegrini di Speranza, un viaggio emozionante e spirituale attraverso la storia e il significato dell'Anno Santo. Questo libro offre un percorso approfondito che unisce la dimensione storica e spirituale del Giubileo, fornendo al lettore strumenti pratici per vivere con autenticità l’esperienza del pellegrinaggio.\n\nAttraverso racconti avvincenti, riflessioni profonde e consigli utili, ogni pagina invita a riscoprire la misericordia di Dio, a comprendere il valore del perdono e a vivere la speranza nella vita quotidiana.\n\nPerfetto per pellegrini, studiosi e chiunque desideri approfondire il significato di questo evento straordinario.", "amazonLink": "", "rating": 4.5}, {"title": "Starlit Encounters: Tales of Love, Fate, and Second Chances", "author": "Sofia Valiani", "category": "Book", "cover": "", "description": "Love can be found in the most unexpected places—between the lines of a song, beneath the glow of city lights, or in the whispers of the stars above. Starlit Encounters: Tales of Love, Fate, and Second Chances is a heartfelt collection of romantic short stories that explore the serendipitous moments that bring people together in the most beautiful and unpredictable ways.\n\nFollow a woman who discovers a playlist that mirrors her love for the cosmos, a marketing executive who hires a fake boyfriend only to find something real, and two strangers whose paths cross on a fateful night in Paris. With each turn of the page, you'll find stories filled with longing, hope, and the courage it takes to embrace love when it comes knocking.\n\nPerfect for fans of tender, uplifting romance and those who believe in the magic of destiny, Starlit Encounters invites you to fall in love with love all over again.", "amazonLink": "", "rating": 4.5}, {"title": "Mindful Leadership: A Science-Based Approach to Stress Management for Modern Professionals", "author": "John Keagan", "category": "Book", "cover": "", "description": "A science-based guide that combines neuroscience with business applications to help professionals enhance leadership capabilities and organizational performance through mindfulness. Supported by research from Harvard, Stanford, and MIT, it showcases successful mindfulness implementations at major corporations that improved productivity, reduced healthcare costs, and strengthened team dynamics. The book addresses modern workplace challenges like digital fatigue and information overload, offering practical techniques for better decision-making under pressure, managing technology stress, building sustainable performance, developing emotional intelligence, and implementing organizational change. Designed for executives and professionals at all levels seeking to transform workplace pressure into excellence.", "amazonLink": "", "rating": 4.5}, {"title": "Emozioni Intrecciate: Cinque storie, un intreccio di emozioni indimenticabili", "author": "Sofia Valiani", "category": "Book", "cover": "", "description": "\"Emozioni Intrecciate\" è una raccolta di cinque racconti che esplorano l’amore, le seconde possibilità e la forza delle connessioni umane. Ambientate in luoghi suggestivi come Parigi, un villaggio italiano immerso nella natura e una libreria fuori dal tempo, queste storie raccontano l’incontro tra personaggi imperfetti, autentici e pronti a riscoprire se stessi.\n\nOgni racconto vi porterà in un viaggio unico: il battito di un amore inaspettato, il fascino di un mistero custodito nel tempo, il coraggio di affrontare il passato per abbracciare il futuro. Perfetto per chi cerca emozioni autentiche e un pizzico di magia nella vita di tutti i giorni.\n\nSe amate le storie che parlano al cuore e che vi lasciano con un sorriso e una riflessione, questa collana è ciò che fa per voi.", "amazonLink": "", "rating": 4.5}, {"title": "The Poetic Future: Humanity, Technology, and the Art of Progress", "author": "J. Cipher Monroe", "category": "Book", "cover": "", "description": "In The Poetic Future: Humanity, Technology, and the Art of Progress, explore the intersection of cutting-edge innovation and timeless human values. This book offers a profound journey into how technology reflects, challenges, and amplifies what it means to be human. Through a narrative that blends philosophy, history, and speculative thought, it delves into the ethical dilemmas of progress, the transformative power of empathy, and the importance of preserving individuality in an increasingly digital world.\n\nWhether you are a technologist, artist, philosopher, or simply curious about the future, this book invites you to envision a harmonious relationship between humanity and innovation. Discover how creativity, ethics, and imagination can shape a future that is not only advanced but deeply meaningful—a future worth aspiring to", "amazonLink": "", "rating": 4.5}, {"title": "SHINRIN-YOKU: The Healing Power of the Forest: A comprehensive guide to regaining balance, well-being, and connection with nature", "author": "Saito K. Jackson", "category": "Book", "cover": "", "description": "Discover the transformative power of Shinrin-Yoku, or forest bathing, a Japanese practice that invites you to reconnect with nature for physical, mental, and emotional well-being. Blending ancient traditions, scientific research, and practical guidance, this book provides a complete roadmap to immerse yourself in the healing energy of forests. Learn the origins of Shinrin-Yoku, explore its profound health benefits, and uncover how this simple yet powerful practice can help reduce stress, enhance creativity, and foster a mindful, harmonious lifestyle. Whether you're seeking personal renewal or a deeper connection with the natural world, this guide will inspire you to embrace the serenity and wisdom of the forest.", "amazonLink": "", "rating": 4.5}, {"title": "Shinrin-Yoku: Il Potere Guaritore della Foresta: Una guida completa per ritrovare equilibrio, benessere e connessione con la natura", "author": "Saito K. Jackson", "category": "Book", "cover": "", "description": "Scopri il potere rigenerante della foresta con Shinrin-Yoku: Il Potere Guaritore della Foresta, una guida completa che ti accompagna in un viaggio unico per riconnetterti con la natura e ritrovare il benessere. Questa pratica giapponese, conosciuta anche come \"bagno nella foresta\", è un approccio semplice ma profondo per ridurre lo stress, migliorare la salute e vivere con maggiore consapevolezza.\n\nIl libro esplora le radici culturali dello Shinrin-Yoku, i suoi benefici scientificamente provati e fornisce consigli pratici per integrare questa pratica nella tua vita quotidiana, anche se vivi in un contesto urbano. Attraverso tecniche per attivare i sensi, camminate consapevoli e pause meditative, imparerai a immergerti nell’atmosfera della foresta e a trarne il massimo beneficio per il corpo e la mente.\n\nChe tu sia alla ricerca di equilibrio emotivo, maggiore creatività o semplicemente di un momento di pace, questo libro ti guiderà passo dopo passo in un’esperienza trasformativa. Scopri come la natura può diventare il tuo rifugio e la tua fonte di energia, in ogni stagione e in ogni luogo.", "amazonLink": "", "rating": 4.5}, {"title": "Il Silenzio delle Vette: La verità ha sempre un prezzo", "author": "Alessandra Montalcini", "category": "Book", "cover": "", "description": "In una remota valle alpina, il villaggio di Oberruhe sembra un paradiso idilliaco, congelato nel tempo. Le sue strade acciottolate, le case in legno e l’eco delle campane della chiesa raccontano una storia di tranquillità. Ma sotto questa facciata serena, si cela un sistema di controllo spietato. La Concordia, l’organizzazione che governa il villaggio, sostiene che una peste mortale abbia devastato il mondo esterno, rendendo l'isolamento l’unica salvezza possibile.\n\nElisa Hauser, una giovane dal cuore ribelle e dalla mente curiosa, non ha mai creduto completamente a quelle storie. Quando scopre un’antica mappa che rivela un passaggio segreto oltre le montagne, la sua determinazione a scoprire la verità la porta a scontrarsi con i segreti oscuri di Oberruhe.\n\nTra complessi sotterranei, una tecnologia avanzata che contrasta con l'apparente semplicità del villaggio, e un sistema progettato per soffocare ogni volontà, Elisa dovrà guidare una ribellione per la libertà. Ma il costo della verità sarà altissimo.\n\nUn romanzo distopico che intreccia suspense, introspezione e azione, esplorando i limiti del controllo e la forza della resistenza umana. Se hai amato \"The Giver\", \"The Hunger Games\" o \"1984\", “Oltre le Montagne” ti porterà in un viaggio di scoperta e ribellione che non dimenticherai.", "amazonLink": "", "rating": 4.5}, {"title": "Oltre il Sentiero: Etica, Natura e Vita nel Postumano: Un dialogo tra il viandante e il suo tempo", "author": "Lorenzo De Sanctis", "category": "Book", "cover": "", "description": "In un’epoca dominata dalla tecnica, dall’iperconnessione e dalla crisi ambientale, il viandante emerge come una figura archetipica e rivoluzionaria, capace di offrire una nuova etica per vivere in equilibrio con il mondo. Questo libro, ispirato ai principi de L’etica del viandante di Umberto Galimberti, approfondisce il concetto del cammino come ricerca esistenziale e come strumento per affrontare le sfide del presente.\n\nCosa troverai in questo libro:\n\nUna riflessione filosofica e narrativa sul rapporto tra uomo, tecnica e natura.\nStorie di moderni viandanti, cammini storici e comunità che riscoprono la lentezza e la sostenibilità.\nUn’analisi dei concetti chiave del nostro tempo: Antropocene, limite, lentezza, solidarietà.\nSpunti pratici per vivere in armonia con i ritmi naturali e riscoprire la bellezza del cammino, fisico e interiore.\nOltre il Sentiero è solo un libro per chi cerca nuove prospettive sul futuro, un equilibrio tra progresso e rispetto per la terra, e un’etica capace di connettere l’uomo con la natura e con sé stesso.", "amazonLink": "", "rating": 4.5}, {"title": "Focus and Mental Clarity: A Step-by-Step Guide to Overcoming Procrastination and Building Habits for Success", "author": "John Keagan", "category": "Book", "cover": "", "description": "A practical guide addressing procrastination, distraction, and self-doubt by explaining the science of focus and psychology of procrastination. The book offers actionable strategies to rewire the brain for better concentration, overcome emotional triggers of procrastination, build sustainable habits, align goals with personal values, and develop emotional resilience. Through real-world examples and practical tools, it provides a blueprint for achieving personal growth, career advancement, and life balance by taking intentional action and maintaining momentum toward meaningful goals.", "amazonLink": "", "rating": 4.5}, {"title": "Cucina al Contrario: Ribalta la Tua Tavola!", "author": "Chef Savorelli", "category": "Book", "cover": "", "description": "\"Cucina al Contrario\" è un viaggio gastronomico rivoluzionario che sfida le convenzioni culinarie tradizionali.\n\nIn questo ricettario unico, ogni piatto è un'avventura dove dolce diventa salato, le consistenze si invertono e i contorni diventano protagonisti.\n\nCon oltre 50 ricette dettagliate, scoprirete come trasformare una lasagna in un'esperienza croccante, come rendere il gelato piccante e come far diventare le verdure il cuore di un dessert raffinato.\n\nUn libro per chi ama sperimentare senza perdere il comfort dei sapori familiari, perfetto per cuochi amatoriali e professionisti che vogliono esplorare nuovi territori gastronomici.", "amazonLink": "", "rating": 4.5}, {"title": "Mocktail Magic: Il Mondo dei Cocktail Analcolici", "author": "Chef Savorelli", "category": "Book", "cover": "", "description": "Benvenuti nell’universo dei mocktail! \n🍹✨ Mocktail Magic è il ricettario definitivo per chi desidera creare bevande deliziose, colorate e completamente analcoliche. Perfetto per feste, brunch, serate rilassanti o momenti di creatività in cucina, questo libro ti guiderà passo dopo passo nella pre inare, che intreccia comunicazione, psicologia sociale, filosofia e teoria dei media, il saggio invita il lettore a riflettere criticamente sul proprio rapporto con l’informazione e sul potere invisibile delle “stanze” in cui abitiamo mentalmente. Pensato per studenti, ricercatori e lettori curiosi, questo testo fornisce una mappa concettuale per orientarsi nel rumore amplificato della contemporaneità.", "amazonLink": "", "rating": 4.5}, {"title": "Autostima Infrangibile: 30 giorni di pratiche evidence-based per consolidare fiducia in sé, resilienza emotiva e benessere cognitivo", "author": "Massimo Recaldi", "category": "Book", "cover": "", "description": "Un manuale integrato che fonde neuroscienze, mindfulness e psicologia cognitivo-comportamentale in un percorso articolato in trenta giorni per rafforzare autostima, resilienza e presenza consapevole.\nOgni capitolo propone esercizi concreti — dal dialogo interiore alle esposizioni graduali, dai micro-rituali quotidiani alle strategie per adattarsi agli imprevisti — corredati da spiegazioni scientifiche chiare e riferimenti peer-reviewed. Adatto a chi desideri un cambiamento duraturo, offre strumenti pratici per trasformare convinzioni limitanti in risorse, creare contesti di supporto e costruire un piano di sviluppo continuo.\nRicco di tecniche di auto-compassione, proiezioni di Sé ideale e percorsi avanzati, questo libro è la guida essenziale per chi ambisce a un’autostima infrangibile.", "amazonLink": "", "rating": 4.5}, {"title": "The 7-Day Puppy Training Miracle: Transform Your Puppy into a Well-Behaved Family Dog Using Proven Positive Methods", "author": "Michael K. Anderson", "category": "Book", "cover": "", "description": "Transform Your Chaotic Puppy Into the Perfect Family Dog in Just 7 Days!\n\nAre you overwhelmed by your new puppy's endless energy, house training accidents, and destructive behavior? Do you feel like you're failing as a dog owner when your furry friend won't listen to basic commands?\n\nYou're not alone - and this book will change everything.\n\nThe 7-Day Puppy Training Miracle is the complete beginner's guide that transforms even the most stubborn puppies into well-behaved, happy family dogs using proven positive reinforcement methods. Written for busy people who want fast results without spending hours on complicated training.\n\nWhat Makes This Book Different:\n✅ Day-by-Day System: Clear daily plans that build on each other\n✅ 10 Minutes Per Day: Perfect for busy schedules - no marathon training sessions\n✅ Positive Methods Only: No harsh corrections or outdated dominance techniques\n✅ Real-World Solutions: Addresses actual problems new puppy owners face\n✅ Beginner-Friendly: Written for people with zero dog training experience", "amazonLink": "", "rating": 4.5}, {"title": "THE HEIR OF THE STARS: The Prophecy of Light's Blood", "author": "A.R. Blackthorne", "category": "Book", "cover": "", "description": "In a world where magic flows through stellar crystals and ancient prophecies whisper of dark times, Lyra Nightwhisper lives as a simple healer in the village of Thornhaven. But when the Shadow Empire attacks her hometown, the girl's desperate touch awakens a forgotten power: the Light's Blood of the ancient Stellari.\n\nForced to flee, Lyra discovers she is the last descendant of a lost lineage, destined according to an ancient prophecy to awaken the three Eternal Guardians before Malachar, the Shadow Lord, completes his ritual to plunge the world into eternal darkness. Guided by the mysterious mage Theron Stormweaver and accompanied by the young elven warrior Kael Moonblade and the cunning thief Zara Shadowstep, Lyra must embark on a perilous journey through enchanted lands and cosmic dimensions.\n\nHer path will take her from the Whispering Forest to the Draconic Mountains, from the Cursed Lands to the very boundaries of reality itself, where she must confront cosmic entities and discover that the world's fate depends not on light's victory over darkness, but on the ability to make both forces dance together in a harmony that transcends all conflict.\n\nAn epic saga that reinvents fantasy classics through a narrative that evolves from traditional tropes toward unexpected cosmic horizons, where personal growth becomes universal evolution and friendship transforms into existence's most powerful force.\n\nPerfect for readers who loved Brandon Sanderson's The Stormlight Archive, Robin Hobb's Realm of the Elderlings, and anyone seeking fantasy that pushes beyond conventional boundaries into philosophical and cosmic territories while maintaining the heart and wonder that makes the genre magical.", "amazonLink": "", "rating": 4.5}, {"title": "Tra le Pagine del Cuore: Una storia d'amore tra i libri", "author": "Rob Pac", "category": "Book", "cover": "", "description": "Una libraia trentenne che ha trovato rifugio tra i libri dopo una delusione d'amore. Uno scrittore in crisi creativa che ha perso la capacità di raccontare storie. Un incontro casuale in una piccola libreria di Firenze che cambierà per sempre le loro vite.\n\nElena Rosati gestisce \"Pagine Sospese\", una libreria indipendente nel cuore di Firenze, dove ogni libro trova il suo lettore ideale. La sua vita scorre tranquilla e prevedibile finché Marco Santini, scrittore di thriller in cerca di ispirazione, non entra nel suo mondo cercando una raccolta di Neruda.\n\nQuello che inizia come una semplice discussione letteraria si trasforma in una collaborazione creativa, poi in un amore profondo e autentico. Insieme, Elena e Marco scoprono che l'amore può essere la più potente fonte di ispirazione, e decidono di raccontare la loro storia scrivendo un libro insieme.\n\n\"Tra le Pagine del Cuore\" è il romanzo che nasce da quella decisione: una storia d'amore contemporanea che celebra il potere dei libri di trasformare le vite, l'importanza dell'autenticità in un mondo artificiale, e la magia che accade quando due anime gemelle si riconoscono tra gli scaffali di una libreria.\n\nUna lettura perfetta per chi crede ancora nell'amore vero e nel potere delle storie di cambiare il mondo.", "amazonLink": "", "rating": 4.5}, {"title": "Visualizzazione Positiva e Mental Imagery Orientata all’Esito: Fondamenti Teorici, Metodologie e Applicazioni per il Benessere, la Performance e il Processo Creativo", "author": "Roberto Pacetti", "category": "Book", "cover": "", "description": "Una narrazione coinvolgente guida il lettore alla scoperta delle potenzialità della mente attraverso immagini interiori capaci di orientare emozioni, comportamenti e risultati concreti. Questo volume offre un percorso approfondito che integra basi neurocognitive, modelli teorici, protocolli pratici e riflessioni etiche, illustrando come coltivare la capacità di evocare scenari mentali positivi in contesti personali, professionali e creativi. L’approccio proposto non si limita a esercizi di fantasia, ma incoraggia una co-costruzione dell’esperienza immaginativa che rispetta la soggettività e valorizza la gradualità: ogni capitolo accompagna il lettore in una riflessione formale, senza ridurre il contenuto a istruzioni prefabbricate, ma offrendo chiavi di comprensione che favoriscono un dialogo interno continuo. I principi esposti consentono di integrare la visualizzazione positiva in pratiche di benessere mentale, performance sportiva, processi creativi, self-publishing e interventi clinici, con attenzione alla diversità culturale, all’equità di accesso e all’uso responsabile delle tecnologie emergenti. Chi affronta questo libro scopre come l’immaginazione guidata e autonoma diventi strumento di auto-regolazione e di resilienza, un ponte tra obiettivi desiderati e risorse interiori, capace di sostenere cambiamenti stabili nel tempo.", "amazonLink": "", "rating": 4.5}, {"title": "Due Cuori, Una Santità: Pier Giorgio Frassati e Carlo Acutis: Verso la canonizzazione", "author": "Lorenzo De Sanctis", "category": "Book", "cover": "", "description": "Il 7 settembre 2025 la Chiesa cattolica proclamerà santi due giovani straordinari, testimoni di fede, carità e speranza: Pier Giorgio Frassati e Carlo Acutis. Un evento senza precedenti che unisce Torino e Milano, l’era industriale e l’epoca digitale, le vette alpine e il web. Questo libro ripercorre, con rigore e profondità spirituale, le loro vite, le loro opere e il significato ecclesiale di una canonizzazione congiunta che parla al cuore dei giovani del terzo millennio. Non è solo una biografia parallela, ma una meditazione sul volto contemporaneo della santità laicale, su come la fede si possa vivere nell’ordinarietà, con radicalità e amore.", "amazonLink": "", "rating": 4.5}, {"title": "SHIN-SHINOBI NO KOKORO: L'Anima del Nuovo Ninja: Riflessioni sulla Via dell'Ombra Compassionevole", "author": "Saito K. Jackson", "category": "Book", "cover": "", "description": "Un trattato che rilegge la tradizione shinobi come percorso etico e spirituale per l’uomo contemporaneo. “Shin-Shinobi no Kokoro – L’Anima del Nuovo Ninja” propone una riflessione rigorosa e poetica sulla via dell’ombra compassionevole, in cui la pratica dell’invisibilità etica, la disciplina del cuore e l’osservazione profonda formano una grammatica di crescita interiore. L’autore esplora il controllo delle emozioni, la pazienza come forza e il silenzio come spazio di ascolto, guidando il lettore a un’azione disinteressata che trascende l’ansia del risultato.\nAttraverso l’arte dell’osservazione compassionevole e la filosofia dell’azione senza aggressione, emerge una via di trasformazione che integra antica saggezza e istanze del presente.\nOgni capitolo invita a un’esercizio pratico della vigilanza interiore e della responsabilità verso sé, gli altri e le generazioni future, mostrando come le azioni compiute nell’ombra possano propagarsi oltre la propria vita.\nRivolto a chi cerca un orientamento etico profondo, questo testo si colloca come riferimento per chi desidera coniugare fermezza e apertura, forza e nonviolenza, disciplina e creatività in un cammino di autentica libertà interiore.", "amazonLink": "", "rating": 4.5}, {"title": "Intelligenza Artificiale e Debito Cognitivo: Prospettive Critiche sulla Cooperazione Uomo-Macchina", "author": "Massimo Recaldi", "category": "Book", "cover": "", "description": "In un’epoca in cui l’intelligenza artificiale generativa ridefinisce il modo di scrivere, pensare e comunicare, questo saggio offre una riflessione approfondita, rigorosa e interdisciplinare sugli effetti cognitivi, culturali ed etici della cooperazione uomo-macchina.\n\nL’opera analizza i risultati neuroscientifici più recenti, esplora le implicazioni educative e sociali, e propone un approccio critico e consapevole alla supervisione dei testi generati dagli algoritmi. Senza cedere a facili entusiasmi o a condanne pregiudiziali, il volume invita a costruire un dialogo scientifico aperto, capace di garantire la responsabilità autoriale e la pluralità espressiva, pur riconoscendo le opportunità innovative offerte dai modelli linguistici avanzati.\n\nUno strumento essenziale per studiosi, educatori, professionisti della comunicazione e lettori interessati a comprendere le trasformazioni profonde della scrittura nell’era dell’intelligenza artificiale.", "amazonLink": "", "rating": 4.5}, {"title": "Empower Your Team: A Hands-On Guide to Managerial Soft Skills: Master Active Listening, Assertive Communication, Effective Delegation and Conflict Resolution for First-Time Managers in American Workplaces da John Keagan", "author": "John Keagan", "category": "Book", "cover": "", "description": "Empower yourself with a definitive guide that seamlessly bridges the gap between theory and practice, equipping first‑time managers to master the interpersonal skills crucial for today’s dynamic workplaces. This volume delivers:\n\nRigorous Analysis of the foundational principles behind active listening, assertive communication, effective delegation, collaborative conflict resolution, and motivational strategies.\n\nAuthentic Case Studies—masked and narrated to preserve confidentiality—demonstrating how real organizations navigate complex team dynamics and leadership challenges.\n\nReady‑to‑Implement Frameworks that distill academic depth into practical tools, complete with downloadable resources to reinforce learning and accelerate on‑the‑job application.\n\nWhether you’re preparing for your first one‑on‑one, refining your feedback style, or steering cross‑functional initiatives, you will discover clear guidance, illustrative examples, and actionable worksheets designed to transform everyday challenges into opportunities for growth. Embrace the skills that build trust, inspire performance, and foster a culture of continuous improvement—your path to transformative leadership begins here.", "amazonLink": "", "rating": 4.5}]</script>
  <script>
  (function(){
    var PH = 'data:image/svg+xml;utf8,<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="400" height="600"><rect width="100%" height="100%" fill="%23e2e8f0"/><text x="50%" y="52%" text-anchor="middle" font-family="Arial" font-size="18" fill="%23475569">Cover</text></svg>';
    var books = [];
    try{ books = JSON.parse(document.getElementById('books-data').textContent) || []; }catch(_){}

    function card(b, idx){
      return ''
      + '<div class="bg-white rounded-xl overflow-hidden shadow-soft flex flex-col carousel-item">'
      + '  <div class="fixed-ratio">'
      + '    <img src="'+(b.cover||'')+'" alt="'+(b.title||'')+'" loading="lazy" decoding="async" onerror="this.onerror=null;this.src=\''+PH+'\'">'
      + '  </div>'
      + '  <div class="p-4 flex-1 flex flex-col">'
      + '    <span class="inline-block bg-gray-700 text-white text-xxs px-2 py-1 rounded-full mb-2 uppercase font-semibold">'+(b.category||'Book')+'</span>'
      + '    <h3 class="text-base font-bold leading-snug">'+(b.title||'')+'</h3>'
      + '    <p class="text-gray-500 text-xs mb-3">by '+(b.author||'')+'</p>'
      + '    <p class="text-gray-700 text-sm mb-4 line-clamp-3">'+(b.description||'')+'</p>'
      + '    <div class="mt-auto"><button class="w-full bg-yellow-600 text-white py-2 rounded-lg" data-idx="'+idx+'" onclick="openBookModal(this.dataset.idx)">View Details</button></div>'
      + '  </div>'
      + '</div>';
    }

    function render(){
      for(var i=0;i<books.length;i++) books[i].__idx=i;
      var ft = document.getElementById('featuredTrack'); ft.innerHTML='';
      var top = books.slice(0,12);
      for(var i=0;i<top.length;i++) ft.insertAdjacentHTML('beforeend', card(top[i], top[i].__idx));
      var grid=document.getElementById('catalogGrid'); grid.innerHTML='';
      for(var j=0;j<books.length;j++) grid.insertAdjacentHTML('beforeend', card(books[j], books[j].__idx));
    }

    window.openBookModal = function(idx){
      idx = Number(idx);
      var b = books[idx]; if(!b) return;
      var c = document.getElementById('bookModalContent');
      c.innerHTML = ''
        + '<div class="md:col-span-2"><div class="fixed-ratio"><img src="'+(b.cover||'')+'" alt="'+(b.title||'')+'" decoding="async" onerror="this.onerror=null;this.src=\''+PH+'\'"></div></div>'
        + '<div class="md:col-span-3">'
        + '  <h3 class="text-2xl font-extrabold mb-1">'+(b.title||'')+'</h3>'
        + '  <p class="text-gray-500 mb-4">by '+(b.author||'')+'</p>'
        + '  <p class="text-gray-800 leading-relaxed whitespace-normal">'+(b.description||'')+'</p>'
        + '  <div class="flex gap-3 mt-5">'
        + '    <a href="'+(b.amazonLink||'#')+'" target="_blank" class="px-4 py-2 rounded bg-yellow-600 text-white">Buy on Amazon</a>'
        + '  </div>'
        + '</div>';
      var m=document.getElementById('bookModal'); m.classList.remove('hidden'); m.classList.add('flex');
    };
    document.getElementById('closeModal').addEventListener('click', function(){
      var m=document.getElementById('bookModal'); m.classList.add('hidden'); m.classList.remove('flex');
    });

    render();
  })();
  </script>
</body>
</html>
