<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RobPac Publishing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Keep look & feel; do not alter layout beyond hero + cards */
    .hero-wrap{
      position: relative;
      overflow: hidden;
    }
    .hero-wrap img.hero-bg{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .hero-content{ position: relative; z-index: 1; }
    .card-cover{ width: 100%; height: 360px; object-fit: cover; border-top-left-radius: 1rem; border-top-right-radius: 1rem;}
    .book-card{ border-radius: 1rem; box-shadow: 0 6px 20px rgba(0,0,0,.12); background: #fff; overflow:hidden;}
    .tag{ font-size:.75rem; padding:.25rem .5rem; border-radius:999px; background:#e6f9f0; color:#15937a; display:inline-block;}
    .grid-books{ display:grid; grid-template-columns:repeat(1,minmax(0,1fr)); gap:1.25rem;}
    @media (min-width:768px){ .grid-books{ grid-template-columns:repeat(3,minmax(0,1fr)); } }
    .btn{ display:inline-flex; align-items:center; justify-content:center; padding:.8rem 1.25rem; border-radius:.75rem; background:#ef7d00; color:#fff; font-weight:700; }
    .btn:hover{ filter:brightness(.95) }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <!-- HEADER / HERO -->
  <header class="hero-wrap">
    <img src="assets/hero.png" alt="RobPac Publishing banner" class="hero-bg"/>
    <div class="hero-content max-w-6xl mx-auto px-4 pt-10 pb-20">
      <div class="flex items-center gap-3 mb-6">
        <img src="assets/logo3senzasfondo.png" alt="RobPac logo" class="w-10 h-10 rounded-full"/>
        <div class="font-semibold">RobPac Publishing</div>
      </div>
      <div class="max-w-3xl">
        <img src="assets/robpac-title.png" alt="RobPac Publishing" class="w-full max-w-xl mb-2"/>
        <img src="assets/sottotitolo.png" alt="A World of Books at Your Fingertips" class="w-full max-w-md opacity-90"/>
      </div>
      <div class="mt-6 flex gap-4">
        <a href="#catalog" class="btn">Browse 100+ Books</a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <section id="bestsellers" class="mb-12">
      <h2 class="text-3xl font-bold mb-4">Bestselling Titles</h2>
      <div id="bestsellerGrid" class="grid-books"></div>
    </section>

    <section id="catalog" class="mb-20">
      <h2 class="text-3xl font-bold mb-4">Complete Book Catalog</h2>
      <div class="mb-4">
        <input id="search" type="search" placeholder="Search by title, author, or keyword…" class="w-full border rounded-lg p-3"/>
      </div>
      <div id="catalogGrid" class="grid-books"></div>
    </section>
  </main>

  <script>
    // Minimal fix map for the two mismatched covers ONLY
    // DO NOT modify other books or fields
    const coverFix = {
      "Dark Psychology and Manipulation": "covers/dark-psychology-and-manipulation.jpg",
      "SHINRIN-YOKU (USA)": "covers/shinrin-yoku-usa.jpg"
    };

    // Helper: create a card (without short description in the card body)
    function cardHTML(b){
      const cover = coverFix[b.title] ?? b.cover ?? b.image ?? b.img ?? "";
      const rating = b.rating ?? 4.5;
      const amazon = b.amazonLink ?? b.amazon ?? "#";
      return `
      <article class="book-card">
        <img src="${cover}" alt="${b.title} cover" class="card-cover" onerror="this.src='covers/placeholder.jpg'"/>
        <div class="p-4">
          <span class="tag">${(b.category||'Self-help')}</span>
          <h3 class="text-xl font-bold mt-2">${b.title}</h3>
          <p class="text-slate-600 text-sm mb-3">by ${b.author||'—'}</p>
          <a href="${amazon}" target="_blank" rel="noopener" class="btn w-full">View Details</a>
        </div>
      </article>`;
    }

    // Load data from the single JSON file the user renamed: libri_backup.json
    async function loadBooks(){
      try{
        const res = await fetch('libri_backup.json', {cache:'no-store'});
        const raw = await res.json();

        // The file may be shaped as { books:[...] } or { items:[...] } or flat array
        let all = Array.isArray(raw) ? raw : (raw.books || raw.items || raw.data || []);

        // Normalize very lightly, do NOT change values except cover swap above
        all = all.map(x => ({
          title: x.title || x.titolo || "",
          author: x.author || x.autore || "",
          category: x.category || x.genere || "Self-help",
          cover: x.cover || x.copertina || x.image || x.img || "",
          amazonLink: x.amazonLink || x.amazon || x.link || "#",
          rating: x.rating || x.voto || 4.5,
          bestseller: !!x.bestseller || x.top === true
        }));

        // Render bestsellers (first 6 where bestseller flag or first 6 items)
        const best = all.filter(b=>b.bestseller).slice(0,6);
        const bestSrc = (best.length ? best : all.slice(0,6));
        document.getElementById('bestsellerGrid').innerHTML = bestSrc.map(cardHTML).join("");

        // Render catalog
        const grid = document.getElementById('catalogGrid');
        function render(list){ grid.innerHTML = list.map(cardHTML).join(""); }
        render(all);

        // Simple search
        const q = document.getElementById('search');
        q.addEventListener('input', e => {
          const v = e.target.value.toLowerCase().trim();
          if(!v) return render(all);
          render(all.filter(b =>
            (b.title||'').toLowerCase().includes(v) ||
            (b.author||'').toLowerCase().includes(v) ||
            (b.category||'').toLowerCase().includes(v)
          ));
        });
      }catch(err){
        console.error('Error loading libri_backup.json', err);
      }
    }
    loadBooks();
  </script>
</body>
</html>
